<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>new-german-fest local widget test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      color: #18181b;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .surface {
      min-height: 520px;
      padding: 24px;
      background: #fff;
      border: 1px solid #d4d4d8;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main>
    <h1>new-german-fest local widget test</h1>
    <p>Loads <code>/loader.v1.js</code> locally and fetches widget config through the local API.</p>
    <div class="surface">
      <script
        defer
        src="/loader.v1.js?t=local"
        data-widget-id="new-german-fest">
      </script>
    </div>
  </main>
</body>
</html>
